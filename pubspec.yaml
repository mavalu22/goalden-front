name: goalden
description: A minimal daily and weekly task management app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local storage
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Backend & cloud
  supabase_flutter: ^2.8.4

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

  # Navigation
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI & animations
  flutter_animate: ^4.5.2
  flutter_slidable: ^3.1.1

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.1.3
  uuid: ^4.5.1
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  freezed: ^3.0.0
  json_serializable: ^6.9.3
  drift_dev: ^2.20.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
